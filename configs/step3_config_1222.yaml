# v4 Step 3 config template (UTF-8)

merge:
  # 阈值仅作参考；v4 按 v3 逻辑以 LLM 裁决优先
  high_thr: 0.90
  mid_thr_low: 0.80
  mutual_required: false
  edge_aggregate: ["mean_trim10", "p75", "max", "count"]

vertical:
  topk_candidates: 5
  weights:
    cosine: 0.7
    jaccard: 0.3
  orphan_policy: "create_new_parent"

llm:
  primary: "qwen3-max"
  secondary: "deepseek-r1-0528"
  temperature: 0.2
  max_tokens: 3000
  response_format: "json_object"
  workers: 1
  tie_breaker: "score_margin_or_conservative"

paths:
  outdir: "data/intermediate_outputs"
  corpus: "data/intermediate_outputs/v4_corpus_calibrated.csv"
  embeddings: "data/intermediate_outputs/v4_embeddings.parquet"
  pairs: "data/intermediate_outputs/v4_rerank_edges.csv"
  l1_def: "data/intermediate_outputs/v4_l1_definition.json"

logging:
  keep_prompts: true
  redact_vectors: true